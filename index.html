<!DOCTYPE html>
<html>

<head>

<title>Padhoab Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
margin: 0;
font-family: Arial;
background: #eef2f7;
}

.main {

display: flex;
max-width: 900px;
margin: auto;
gap: 10px;

}

.container {

flex: 3;
background: white;
padding: 15px;
border-radius: 10px;

}

.panel {

flex: 1;
background: white;
padding: 10px;
border-radius: 10px;

}

.panel button {

width: 40px;
height: 40px;
margin: 4px;
border: none;
border-radius: 6px;
cursor: pointer;

}

.notVisited {

background: #e5e7eb;

}

.visited {

background: #93c5fd;

}

.answered {

background: #22c55e;
color: white;

}

.option {

width: 100%;
padding: 10px;
margin: 5px 0;
border: none;
border-radius: 8px;
background: #f1f5f9;
cursor: pointer;

}

.selected {

background: #2563eb;
color: white;

}

.navButtons {

display: flex;
gap: 5px;

}

.navButtons button {

flex: 1;
padding: 10px;

}

#progressBar {

height: 8px;
background: #ddd;
margin-bottom: 10px;

}

#progress {

height: 8px;
background: blue;
width: 0%;

}

</style>

</head>

<body>

<div class="main">

<div class="container">

<h3 id="qno"></h3>

<div id="progressBar">
<div id="progress"></div>
</div>

<p id="question"></p>

<button class="option" id="b0" onclick="answer(0)"></button>
<button class="option" id="b1" onclick="answer(1)"></button>
<button class="option" id="b2" onclick="answer(2)"></button>
<button class="option" id="b3" onclick="answer(3)"></button>

<div class="navButtons">

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitTest()">Submit</button>

</div>

</div>

<div class="panel" id="panel">

</div>

</div>

<script>

let q = 0;
let quiz = [];
let answers = [];
let visited = [];

async function loadSheet() {

let url =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

let res = await fetch(url);
let data = await res.json();

for (let i=0;i<data.length;i++) {

quiz.push({

question: data[i].question,

options: [
data[i].op1,
data[i].op2,
data[i].op3,
data[i].op4
],

correct: parseInt(data[i].correct)

});

answers.push(null);
visited.push(false);

}

createPanel();

load();

}

function createPanel() {

let p = document.getElementById("panel");

for (let i=0;i<quiz.length;i++) {

let b = document.createElement("button");

b.innerHTML = i+1;

b.className = "notVisited";

b.onclick = () => {

q=i;
load();

};

p.appendChild(b);

}

}

function updatePanel() {

let p = document.getElementById("panel").children;

for (let i=0;i<quiz.length;i++) {

if (answers[i] != null)
p[i].className="answered";

else if (visited[i])
p[i].className="visited";

else
p[i].className="notVisited";

}

}

function load() {

visited[q]=true;

updatePanel();

document.getElementById("qno").innerHTML =
"Question "+(q+1)+" / "+quiz.length;

document.getElementById("question").innerHTML =
quiz[q].question;

for (let i=0;i<4;i++) {

let b = document.getElementById("b"+i);

b.className="option";

b.innerHTML=quiz[q].options[i];

if (answers[q]==i)
b.classList.add("selected");

}

updateProgress();

}

function answer(i) {

answers[q]=i;
load();

}

function next(){

if(q<quiz.length-1){
q++;
load();
}

}

function prev(){

if(q>0){
q--;
load();
}

}

function updateProgress(){

let percent =
(q/quiz.length)*100;

document.getElementById("progress").style.width =
percent+"%";

}

function submitTest(){

let score=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]==quiz[i].correct)
score++;

}

alert("Score = "+score);

}

loadSheet();

</script>

</body>
</html>
