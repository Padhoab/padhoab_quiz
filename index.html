<!DOCTYPE html>
<html>
<head>
<title>Padhoab Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

button {
  display: block;
  width: 100%;
  margin: 5px;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Padhoab Daily Quiz</h2>

<p id="question"></p>

<button onclick="answer(0)" id="b0"></button>
<button onclick="answer(1)" id="b1"></button>
<button onclick="answer(2)" id="b2"></button>
<button onclick="answer(3)" id="b3"></button>

<p id="result"></p>

<button onclick="next()">Next</button>

</div>
<script src="questions.js"></script>
<script>

<script>

let q = 0;
let score = 0;
let quiz = [];

async function loadSheet() {

let url =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTinxhiXxpng1TdgUWHRoYIoopW4ZuP-Z2MG3DGPVhlZE--AF6poruaYuULnLsgUetIIB5by5d_wgSv/pub?output=csv";

let res = await fetch(url);
let text = await res.text();

let rows = text.trim().split("\n");

for (let i = 1; i < rows.length; i++) {

let cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

if (cols.length < 6) continue;

quiz.push({
question: cols[0],
options: [cols[1], cols[2], cols[3], cols[4]],
correct: parseInt(cols[5])
});

}

loadQuestion();

}

function loadQuestion() {

if (quiz.length == 0) return;

document.getElementById("question").innerHTML =
quiz[q].question;

for (let i = 0; i < 4; i++) {

document.getElementById("b"+i).innerHTML =
quiz[q].options[i];

}

}

function answer(i) {

if (i == quiz[q].correct) {

score++;
document.getElementById("result").innerHTML="Correct";

} else {

document.getElementById("result").innerHTML="Wrong";

}

}

function next() {

q++;

if (q < quiz.length) {

loadQuestion();
document.getElementById("result").innerHTML="";

} else {

document.getElementById("question").innerHTML =
"Finished. Score = " + score;

}

}

loadSheet();

</script>
