<script>

let q = 0;
let quiz = [];
let answers = [];
let visited = [];
let userName = "";

const questionAPI =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

const resultAPI =
"https://sheetdb.io/api/v1/qejobk1s0ferj?sheet=results";

async function login() {

userName = prompt("Enter your name");

if (!userName) login();

}

async function loadSheet() {

await login();

let res = await fetch(questionAPI);

let data = await res.json();

for (let i=0;i<data.length;i++) {

quiz.push({

question:data[i].question,

options:[
data[i].op1,
data[i].op2,
data[i].op3,
data[i].op4
],

correct:parseInt(data[i].correct)

});

answers.push(null);
visited.push(false);

}

createPanel();
load();

}

function createPanel(){

let p=document.getElementById("panel");

for(let i=0;i<quiz.length;i++){

let b=document.createElement("button");

b.innerHTML=i+1;

b.className="notVisited";

b.onclick=()=>{

q=i;
load();

};

p.appendChild(b);

}

}

function updatePanel(){

let p=document.getElementById("panel").children;

for(let i=0;i<quiz.length;i++){

if(answers[i]!=null)
p[i].className="answered";

else if(visited[i])
p[i].className="visited";

else
p[i].className="notVisited";

}

}

function load(){

visited[q]=true;

updatePanel();

document.getElementById("qno").innerHTML=
"Question "+(q+1)+" / "+quiz.length;

document.getElementById("question").innerHTML=
quiz[q].question;

for(let i=0;i<4;i++){

let b=document.getElementById("b"+i);

b.className="option";

b.innerHTML=quiz[q].options[i];

if(answers[q]==i)
b.classList.add("selected");

}

}

function answer(i){

answers[q]=i;
load();

}

function next(){

if(q<quiz.length-1){

q++;
load();

}

}

function prev(){

if(q>0){

q--;
load();

}

}

async function submitTest(){

let score=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]==quiz[i].correct)
score++;

}

// save result

await fetch(resultAPI,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

data:{
name:userName,
score:score,
total:quiz.length,
time:new Date().toLocaleString()
}

})

});

alert("Score = "+score);

}

loadSheet();

</script>
