<script>

let q=0;
let quiz=[];
let answers=[];
let userName="";
let subject="";
let dataAll=[];

const qAPI =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

const rAPI =
"https://sheetdb.io/api/v1/qejobk1s0ferj?sheet=results";

async function start(){

userName = prompt("Enter Name");

if(!userName){

start();
return;

}

let res = await fetch(qAPI);

dataAll = await res.json();

showSubjects();

}

function showSubjects(){

let subjects = [];

for(let i=0;i<dataAll.length;i++){

let s = dataAll[i].subject;

if(!subjects.includes(s)){

subjects.push(s);

}

}

let html = "<h2>Select Subject</h2>";

for(let i=0;i<subjects.length;i++){

html +=
"<button onclick=\"selectSubject('"+subjects[i]+"')\">"
+ subjects[i] +
"</button><br>";

}

document.body.innerHTML = html;

}

function selectSubject(s){

subject = s;

for(let i=0;i<dataAll.length;i++){

if(dataAll[i].subject == subject){

quiz.push({

question:dataAll[i].question,

options:[
dataAll[i].op1,
dataAll[i].op2,
dataAll[i].op3,
dataAll[i].op4
],

correct:parseInt(dataAll[i].correct)

});

answers.push(null);

}

}

showQuizUI();

}

function showQuizUI(){

document.body.innerHTML = `

<div id="panel"></div>

<h3 id="qno"></h3>

<p id="question"></p>

<button id="b0" onclick="answer(0)"></button>
<button id="b1" onclick="answer(1)"></button>
<button id="b2" onclick="answer(2)"></button>
<button id="b3" onclick="answer(3)"></button>

<br><br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitTest()">Submit</button>

`;

createPanel();

load();

}

function createPanel(){

let p=document.getElementById("panel");

for(let i=0;i<quiz.length;i++){

let b=document.createElement("button");

b.innerHTML=i+1;

b.onclick=()=>{

q=i;
load();

};

p.appendChild(b);

}

}

function load(){

document.getElementById("qno").innerHTML =
subject + " Q"+(q+1);

document.getElementById("question").innerHTML =
quiz[q].question;

for(let i=0;i<4;i++){

document.getElementById("b"+i).innerHTML =
quiz[q].options[i];

}

}

function answer(i){

answers[q]=i;

}

function next(){

if(q<quiz.length-1){

q++;
load();

}

}

function prev(){

if(q>0){

q--;
load();

}

}

async function submitTest(){

let score=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]==quiz[i].correct)
score++;

}

await fetch(rAPI,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

data:{
name:userName,
score:score,
total:quiz.length,
subject:subject,
time:new Date().toLocaleString()
}

})

});

showLeaderboard();

}

async function showLeaderboard(){

let res=await fetch(rAPI);

let data=await res.json();

let html="<h2>"+subject+" Leaderboard</h2>";

for(let i=0;i<data.length;i++){

if(data[i].subject==subject){

html+=data[i].name+
" - "+data[i].score+"<br>";

}

}

document.body.innerHTML=html;

}

start();

</script>
