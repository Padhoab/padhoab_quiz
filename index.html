<!DOCTYPE html>
<html>

<head>

<title>Padhoab Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
}

h2{
text-align:center;
color:#1e3a8a;
}

.timer{
color:red;
font-weight:bold;
text-align:right;
}

.panel button{
width:40px;
height:40px;
margin:3px;
border:none;
border-radius:6px;
background:#e5e7eb;
}

.option{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#f1f5f9;
font-size:16px;
}

.option:hover{
background:#dbeafe;
}

.selected{
background:#2563eb;
color:white;
}

.nav button{
padding:10px;
margin:5px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}

.subjectBtn{
padding:10px;
margin:5px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
width:100%;
}

</style>

</head>

<body>

<div id="app" class="container">

Loading...

</div>

<script>

let q=0;
let quiz=[];
let answers=[];
let userName="";
let subject="";
let dataAll=[];
let timer;
let timeLeft=60;

const qAPI =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

const rAPI =
"https://sheetdb.io/api/v1/qejobk1s0ferj?sheet=results";


async function start(){

userName = prompt("Enter Name");

if(!userName){
start();
return;
}

let res = await fetch(qAPI);

dataAll = await res.json();

showSubjects();

}


function showSubjects(){

let subjects=[];

for(let i=0;i<dataAll.length;i++){

let s=dataAll[i].Subject;

if(!subjects.includes(s))
subjects.push(s);

}

let html="<h2>Select Subject</h2>";

for(let i=0;i<subjects.length;i++){

html+=
"<button class='subjectBtn' onclick=\"selectSubject('"+subjects[i]+"')\">"+
subjects[i]+
"</button>";

}

document.getElementById("app").innerHTML=html;

}


function selectSubject(s){

subject=s;

quiz=[];
answers=[];
q=0;

for(let i=0;i<dataAll.length;i++){

if(dataAll[i].Subject==subject){

quiz.push({

question:dataAll[i].question,

options:[
dataAll[i].op1,
dataAll[i].op2,
dataAll[i].op3,
dataAll[i].op4
],

correct:parseInt(dataAll[i].correct)

});

answers.push(null);

}

}

timeLeft=60;

showQuizUI();

startTimer();

}


function startTimer(){

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerHTML=
"Time: "+timeLeft;

if(timeLeft<=0){

submitTest();

}

},1000);

}


function showQuizUI(){

let html="";

html+="<h2>"+subject+" Quiz</h2>";

html+="<div class='timer' id='timer'></div>";

html+="<div id='panel' class='panel'></div>";

html+="<h3 id='qno'></h3>";

html+="<p id='question'></p>";

html+="<button class='option' id='b0' onclick='answer(0)'></button>";
html+="<button class='option' id='b1' onclick='answer(1)'></button>";
html+="<button class='option' id='b2' onclick='answer(2)'></button>";
html+="<button class='option' id='b3' onclick='answer(3)'></button>";

html+="<div class='nav'>";
html+="<button onclick='prev()'>Prev</button>";
html+="<button onclick='next()'>Next</button>";
html+="<button onclick='submitTest()'>Submit</button>";
html+="</div>";

document.getElementById("app").innerHTML=html;

createPanel();

load();

}


function createPanel(){

let p=document.getElementById("panel");

for(let i=0;i<quiz.length;i++){

let b=document.createElement("button");

b.innerHTML=i+1;

b.onclick=()=>{

q=i;
load();

};

p.appendChild(b);

}

}


function load(){

document.getElementById("qno").innerHTML=
"Question "+(q+1)+" / "+quiz.length;

document.getElementById("question").innerHTML=
quiz[q].question;

for(let i=0;i<4;i++){

let b=document.getElementById("b"+i);

b.className="option";

b.innerHTML=quiz[q].options[i];

if(answers[q]==i)
b.classList.add("selected");

}

}


function answer(i){

answers[q]=i;

load();

}


function next(){

if(q<quiz.length-1){
q++;
load();
}

}


function prev(){

if(q>0){
q--;
load();
}

}


async function submitTest(){

clearInterval(timer);

let score=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]==quiz[i].correct)
score++;

}

await fetch(rAPI,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

data:{
name:userName,
score:score,
total:quiz.length,
subject:subject,
time:new Date().toLocaleString()
}

})

});

showResult(score);

}


async function showResult(score){

let res=await fetch(rAPI);

let data=await res.json();

let html="<h2>Result</h2>";

html+="Your Score: "+score+" / "+quiz.length+"<br><br>";

html+="<h3>"+subject+" Leaderboard</h3>";

for(let i=0;i<data.length;i++){

if(data[i].subject==subject){

html+=
data[i].name+
" - "+
data[i].score+
"<br>";

}

}

document.getElementById("app").innerHTML=html;

}


start();

</script>

</body>

</html>
