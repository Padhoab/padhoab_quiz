<script>

let q=0;
let quiz=[];
let answers=[];
let userName="";
let subject="";
let timer;
let timeLeft=60;

const qAPI=
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

const rAPI=
"https://sheetdb.io/api/v1/qejobk1s0ferj?sheet=results";

async function login(){

userName=prompt("Enter Name");

subject=prompt("Enter Subject");

if(!userName||!subject) login();

}

async function loadSheet(){

await login();

let res=await fetch(qAPI);

let data=await res.json();

for(let i=0;i<data.length;i++){

if(data[i].subject==subject){

quiz.push({

question:data[i].question,

options:[
data[i].op1,
data[i].op2,
data[i].op3,
data[i].op4
],

correct:parseInt(data[i].correct)

});

answers.push(null);

}

}

startTimer();

createPanel();

load();

}

function startTimer(){

timeLeft=60;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerHTML=timeLeft;

if(timeLeft<=0) submitTest();

},1000);

}

function createPanel(){

let p=document.getElementById("panel");

for(let i=0;i<quiz.length;i++){

let b=document.createElement("button");

b.innerHTML=i+1;

b.onclick=()=>{

q=i;
load();

};

p.appendChild(b);

}

}

function load(){

document.getElementById("qno").innerHTML=
subject+" Q"+(q+1);

document.getElementById("question").innerHTML=
quiz[q].question;

for(let i=0;i<4;i++){

document.getElementById("b"+i).innerHTML=
quiz[q].options[i];

}

}

function answer(i){

answers[q]=i;

}

function next(){

if(q<quiz.length-1){

q++;
load();

}

}

function prev(){

if(q>0){

q--;
load();

}

}

async function submitTest(){

clearInterval(timer);

let score=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]==quiz[i].correct)
score++;

}

await fetch(rAPI,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

data:{
name:userName,
score:score,
total:quiz.length,
subject:subject,
time:new Date().toLocaleString()
}

})

});

showLeaderboard();

}

async function showLeaderboard(){

let res=await fetch(rAPI);

let data=await res.json();

let html="<h2>"+subject+" Leaderboard</h2>";

for(let i=0;i<data.length;i++){

if(data[i].subject==subject){

html+=data[i].name+
" - "+data[i].score+"<br>";

}

}

document.body.innerHTML=html;

}

loadSheet();

</script>
