<!DOCTYPE html>
<html>
<head>
<title>Padhoab Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

button {
  display: block;
  width: 100%;
  margin: 5px;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Padhoab Daily Quiz</h2>

<p id="question"></p>

<button onclick="answer(0)" id="b0"></button>
<button onclick="answer(1)" id="b1"></button>
<button onclick="answer(2)" id="b2"></button>
<button onclick="answer(3)" id="b3"></button>

<p id="result"></p>

<button onclick="next()">Next</button>

</div>
<script src="questions.js"></script>
<script>

let q = 0;
let score = 0;


function load() {

document.getElementById("question").innerHTML =
quiz[q].question;

for (let i=0;i<4;i++) {

document.getElementById("b"+i).innerHTML =
quiz[q].options[i];

}

}

function answer(i) {

if (i == quiz[q].correct) {

score++;

document.getElementById("result").innerHTML =
"Correct";

} else {

document.getElementById("result").innerHTML =
"Wrong";

}

}

function next() {

q++;

if (q < quiz.length) {

load();
document.getElementById("result").innerHTML="";

} else {

document.getElementById("question").innerHTML =
"Finished. Score = " + score;

}

}

load();

</script>

</body>
</html>
