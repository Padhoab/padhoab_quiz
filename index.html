<!DOCTYPE html>
<html>

<head>

<title>Padhoab Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
}

h2{
text-align:center;
color:#1e3a8a;
}

.timer{
color:red;
font-weight:bold;
text-align:right;
}

.option{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#f1f5f9;
}

.selected{
background:#2563eb;
color:white;
}

.subjectBtn{
width:100%;
padding:10px;
margin:5px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}

.nav button{
padding:10px;
margin:5px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}

.resultBox{
padding:10px;
background:#f8fafc;
margin-top:10px;
}

.correct{color:green}
.wrong{color:red}
.final{color:purple;font-weight:bold}

</style>

</head>

<body>

<div style="
background:white;
text-align:center;
padding:10px;
border-bottom:2px solid #1e3a8a;
">

<img src="logo.png" style="width:200px;max-width:90%;">

</div>

<div id="app" class="container">
Loading...

</div>

<script>

let q=0;
let quiz=[];
let answers=[];
let dataAll=[];
let userName="";
let exam="";
let subject="";
let topic="";
let timer;
let timeLeft=60;

const qAPI =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

const rAPI =
"https://sheetdb.io/api/v1/qejobk1s0ferj?sheet=results";


function getTelegramUser(){

try{

let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe.user;

if(user){
return user.username || user.first_name;
}

}catch(e){}

return "Guest";

}


async function start(){

userName = getTelegramUser();

let res = await fetch(qAPI);

dataAll = await res.json();

showExams();

}


function showExams(){

let exams=[];

for(let i=0;i<dataAll.length;i++){

let e=dataAll[i].Exam;

if(!exams.includes(e))
exams.push(e);

}

let html="<h2>Select Exam</h2>";

for(let i=0;i<exams.length;i++){

html+=
"<button class='subjectBtn' onclick=\"selectExam('"+exams[i]+"')\">"+
exams[i]+
"</button>";

}

app.innerHTML=html;

}


function selectExam(e){

exam=e;

let subs=[];

for(let i=0;i<dataAll.length;i++){

if(dataAll[i].Exam==exam){

let s=dataAll[i].Subject;

if(!subs.includes(s))
subs.push(s);

}

}

let html="<h2>Select Subject</h2>";

for(let i=0;i<subs.length;i++){

html+=
"<button class='subjectBtn' onclick=\"selectSubject('"+subs[i]+"')\">"+
subs[i]+
"</button>";

}

app.innerHTML=html;

}


function selectSubject(s){

subject=s;

let topics=[];

for(let i=0;i<dataAll.length;i++){

if(
dataAll[i].Exam==exam &&
dataAll[i].Subject==subject
){

let t=dataAll[i].Topic;

if(!topics.includes(t))
topics.push(t);

}

}

let html="<h2>Select Topic</h2>";

for(let i=0;i<topics.length;i++){

html+=
"<button class='subjectBtn' onclick=\"selectTopic('"+topics[i]+"')\">"+
topics[i]+
"</button>";

}

app.innerHTML=html;

}


function selectTopic(t){

topic=t;

quiz=[];
answers=[];
q=0;

for(let i=0;i<dataAll.length;i++){

if(
dataAll[i].Exam==exam &&
dataAll[i].Subject==subject &&
dataAll[i].Topic==topic
){

quiz.push({

question:dataAll[i].question,

options:[
dataAll[i].op1,
dataAll[i].op2,
dataAll[i].op3,
dataAll[i].op4
],

correct:parseInt(dataAll[i].correct)

});

answers.push(null);

}

}

timeLeft = 30;

showQuiz();

startTimer();

}


function startTimer(){

clearInterval(timer);

timeLeft = 30;

timer = setInterval(()=>{

timeLeft--;

timerBox.innerHTML = "Time: " + timeLeft;

if(timeLeft <= 0){

clearInterval(timer);

if(q < quiz.length-1){

q++;
load();

}else{

submitTest();

}

}

},1000);

}


function showQuiz(){

let html="";

html+="<h2>"+exam+" - "+subject+" - "+topic+"</h2>";

html+="<div>User: "+userName+"</div>";

html+="<div id='timerBox' class='timer'></div>";

html+="<h3 id='qno'></h3>";

html+="<p id='question'></p>";

html+="<button class='option' id='b0' onclick='answer(0)'></button>";
html+="<button class='option' id='b1' onclick='answer(1)'></button>";
html+="<button class='option' id='b2' onclick='answer(2)'></button>";
html+="<button class='option' id='b3' onclick='answer(3)'></button>";

html+="<div class='nav'>";
html+="<button onclick='prev()'>Prev</button>";
html+="<button onclick='next()'>Next</button>";
html+="<button onclick='submitTest()'>Submit</button>";
html+="</div>";

app.innerHTML=html;

timerBox=document.getElementById("timerBox");

load();

}


function load(){

clearInterval(timer);
startTimer();
  
qno.innerHTML=
"Q "+(q+1)+" / "+quiz.length;

question.innerHTML=
quiz[q].question;

for(let i=0;i<4;i++){

let b=document.getElementById("b"+i);

b.className="option";

b.innerHTML=quiz[q].options[i];

if(answers[q]==i)
b.classList.add("selected");

}

}


function answer(i){

answers[q]=i;
load();

}


function next(){

if(q<quiz.length-1){
q++;
load();
}

}


function prev(){

if(q>0){
q--;
load();
}

}


async function submitTest(){

clearInterval(timer);

let correct=0;
let wrong=0;

for(let i=0;i<quiz.length;i++){

if(answers[i]!=null){

if(answers[i]==quiz[i].correct)
correct++;
else
wrong++;

}

}

let pos=1;
let neg=0;

if(exam=="UPSC"){pos=2;neg=0.66;}
else if(exam=="SSC/Railway"){pos=2;neg=0.5;}
else if(exam=="PCS"){pos=2;neg=0.66;}
else if(exam=="Law"){pos=1;neg=0;}

let raw=correct*pos;

let final=(correct*pos)-(wrong*neg);

final=final.toFixed(2);

await fetch(rAPI,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

data:{
name:userName,
score:final,
total:quiz.length,
exam:exam,
subject:subject,
topic:topic,
time:new Date().toLocaleString()
}

})

});

showResult(correct,wrong,raw,final);

}


async function showResult(c,w,raw,final){

let res=await fetch(rAPI);

let data=await res.json();

let html="<h2>Result</h2>";

html+="<div class='resultBox'>";

html+="Correct: <span class='correct'>"+c+"</span><br>";
html+="Wrong: <span class='wrong'>"+w+"</span><br>";
html+="Raw: "+raw+"<br>";
html+="Final: <span class='final'>"+final+"</span>";

html+="</div>";

html+="<h3>Leaderboard</h3>";

for(let i=0;i<data.length;i++){

if(
data[i].exam==exam &&
data[i].subject==subject &&
data[i].topic==topic
){

html+=
data[i].name+" - "+
data[i].score+"<br>";

}

}

app.innerHTML=html;

}

start();

</script>

</body>

</html>
