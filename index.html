<!DOCTYPE html>
<html>

<head>

<title>Padhoab Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
font-family: Arial;
background: #f2f2f2;
text-align: center;
}

.container {
background: white;
padding: 20px;
margin: 20px;
border-radius: 10px;
}

button {
display: block;
width: 100%;
margin: 5px;
padding: 10px;
font-size: 16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Padhoab Daily Quiz</h2>

<p id="question">Loading...</p>

<button id="b0" onclick="answer(0)"></button>
<button id="b1" onclick="answer(1)"></button>
<button id="b2" onclick="answer(2)"></button>
<button id="b3" onclick="answer(3)"></button>

<p id="result"></p>

<button onclick="next()">Next</button>

</div>

<script>

let q = 0;
let score = 0;
let quiz = [];

async function loadSheet() {

let url =
"https://sheetdb.io/api/v1/yqs4b4igymmwc";

let res = await fetch(url);

let data = await res.json();

for (let i = 0; i < data.length; i++) {

quiz.push({

question: data[i].question,

options: [
data[i].op1,
data[i].op2,
data[i].op3,
data[i].op4
],

correct: Number(data[i].correct)

});

}

load();

}

function load() {

document.getElementById("question").innerHTML =
quiz[q].question;

for (let i = 0; i < 4; i++) {

document.getElementById("b"+i).innerHTML =
quiz[q].options[i];

}

}

function answer(i) {

if (i == quiz[q].correct) {

score++;

document.getElementById("result").innerHTML =
"Correct";

} else {

document.getElementById("result").innerHTML =
"Wrong";

}

}

function next() {

q++;

if (q < quiz.length) {

load();

document.getElementById("result").innerHTML = "";

} else {

document.getElementById("question").innerHTML =
"Finished. Score = " + score;

}

}

loadSheet();

</script>

</body>

</html>
